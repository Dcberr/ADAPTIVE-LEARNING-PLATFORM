services:
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: always
    networks:
      - app-network

  jobe:
    image: trampgeek/jobeinabox
    container_name: jobe-server
    ports:
      - "4000:80"
    restart: always
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "${DATABASE_PORT}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data  
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data
    restart: always
    networks:
      - app-network

  leetcode-crawler:
    build:
      context: ./leetcode-crawler
      dockerfile: Dockerfile
    container_name: leetcode-crawler
    ports:
      - "8001:8001"
    environment:
      # Database configuration - có thể override từ .env
      LEETCODE_DB_HOST: ${LEETCODE_DB_HOST:-ep-snowy-tooth-a1bvkkds-pooler.ap-southeast-1.aws.neon.tech}
      LEETCODE_DB_PORT: ${LEETCODE_DB_PORT:-5432}
      LEETCODE_DB_NAME: ${LEETCODE_DB_NAME:-leetcode_data}
      LEETCODE_DB_USER: ${LEETCODE_DB_USER:-neondb_owner}
      LEETCODE_DB_PASSWORD: ${LEETCODE_DB_PASSWORD:-npg_UorC6bIXy4AD}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./leetcode-crawler:/app
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  review-agent:
    build: code-review-ai/
    container_name: review-agent
    ports:
      - "8000:8000"
    env_file:
      - ./code-review-ai/.env
    restart: always
    networks:
      - app-network

  backend:
    build: code-review-backend/
    container_name: spring-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy  
      jobe:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      - SERVER_SERVLET_CONTEXT_PATH=/api
      - APPLICATION_URL=${APPLICATION_URL}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=require&channel_binding=require
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}

      - CLIENT_SECRET=${CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - CLIENT_ID=${CLIENT_ID}

      - JOBE_URL=http://jobe-server/jobe/index.php/restapi
      - REVIEW_AGENT_URL=http://review-agent:8000/api/v1/review_code
      - LEETCODE_API_URL=http://localhost:8001/api/problems

      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_CONSUMER_GROUP=${KAFKA_CONSUMER_GROUP:-code-review-backend}
      - KAFKA_ASSIGNMENT_TOPIC=${KAFKA_ASSIGNMENT_TOPIC:-assignment-events}
      - KAFKA_SUBMISSION_TOPIC=${KAFKA_SUBMISSION_TOPIC:-submission-events}
      - KAFKA_REVIEW_TOPIC=${KAFKA_REVIEW_TOPIC:-review-events}
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
