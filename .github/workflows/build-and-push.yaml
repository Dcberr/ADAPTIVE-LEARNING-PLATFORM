name: Build and Push (CI)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      service:
        description: 'Select service to build and push'
        required: true
        default: 'backend'
        type: choice
        options:
          - backend
          - review-agent
          - frontend
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true
        type: string
      force_tag:
        description: 'Force overwrite existing tag'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: reviewcodeappdevacr.azurecr.io
  ACR_REGISTRY_NAME: reviewcodeappdevacr

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract service info
        id: service-info
        run: |
          # Determine if triggered by tag push or manual dispatch
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG=${{ github.ref_name }}
            # Parse tag format: backend-1.0.0 or similar
            SERVICE=$(echo "$TAG" | cut -d'-' -f1)
            VERSION=$(echo "$TAG" | cut -d'-' -f2-)
          else
            SERVICE=${{ github.event.inputs.service }}
            VERSION=${{ github.event.inputs.version }}
          fi
          
          case $SERVICE in
            backend)
              DOCKERFILE="code-review-backend/Dockerfile"
              BUILD_CONTEXT="code-review-backend"
              IMAGE_NAME="code-review-backend"
              ;;
            review-agent)
              DOCKERFILE="code-review-ai/Dockerfile"
              BUILD_CONTEXT="code-review-ai"
              IMAGE_NAME="review-agent"
              ;;
            frontend)
              DOCKERFILE="code-review-fe/Dockerfile"
              BUILD_CONTEXT="code-review-fe"
              IMAGE_NAME="code-review-frontend"
              ;;
            *)
              echo "Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "build_context=$BUILD_CONTEXT" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ${{ steps.service-info.outputs.build_context }}
          file: ${{ steps.service-info.outputs.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.service-info.outputs.image_name }}:${{ steps.service-info.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.service-info.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          SERVICE=${{ steps.service-info.outputs.service }}
          VERSION=${{ steps.service-info.outputs.version }}
          TAG="${SERVICE}-${VERSION}"
          FORCE_FLAG=""
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if should force overwrite
          if [[ "${{ github.event.inputs.force_tag }}" == "true" ]]; then
            FORCE_FLAG="--force"
            echo "⚠️ Force overwriting tag: $TAG"
          else
            # Check if tag already exists
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "❌ Tag $TAG already exists. Use force_tag=true to overwrite"
              exit 1
            fi
          fi
          
          git tag -a $FORCE_FLAG "$TAG" -m "Release $SERVICE version $VERSION"
          git push origin $FORCE_FLAG "$TAG"

      - name: Print summary
        run: |
          echo "✅ Build and push completed successfully!"
          echo ""
          echo "📦 Image Details:"
          echo "  Service: ${{ steps.service-info.outputs.service }}"
          echo "  Version: ${{ steps.service-info.outputs.version }}"
          echo "  Image: ${{ env.REGISTRY }}/${{ steps.service-info.outputs.image_name }}:${{ steps.service-info.outputs.version }}"
          echo "  Trigger: ${{ github.event_name }}"
          echo ""
          echo "🚀 Ready to deploy!"