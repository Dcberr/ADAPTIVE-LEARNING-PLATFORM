openapi: 3.0.1
info:
  title: LMS API
  version: "1.0"
servers:
- url: http://localhost:8080/api
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: Problem
  description: APIs for problem management
- name: Recommendation
  description: APIs for exercise recommendations and roadmap
- name: Class
  description: APIs for class management
- name: Testcase
  description: APIs for managing problem testcases
- name: Topic
  description: APIs for topic management
- name: User
  description: APIs for user management
- name: Review
  description: APIs for code review (AI-based)
- name: Assignment
  description: APIs for managing assignments
- name: Submission
  description: APIs for code submission and results
- name: Execution
  description: Code execution & judging APIs
- name: Document
  description: APIs for document management
paths:
  /users/me:
    get:
      tags:
      - User
      summary: Get current user profile
      operationId: me
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserResponse"
    put:
      tags:
      - User
      summary: Update current user profile
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserResponse"
  /problems/templates:
    put:
      tags:
      - Problem
      summary: Update problem starter code templates
      operationId: updateProblemTemplate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProblemTemplateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProblemResponse"
  /problems/leetcode/batch:
    put:
      tags:
      - Problem
      summary: Batch update LeetCode problems
      operationId: updateLeetCodeProblems
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/LeetCodeImportRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListProblemResponse"
    post:
      tags:
      - Problem
      summary: Batch import LeetCode problems
      operationId: importLeetCodeProblems
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/LeetCodeImportRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListProblemResponse"
  /topics:
    post:
      tags:
      - Topic
      summary: Create a new topic
      operationId: createTopic
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicResponse"
  /topics/{topicId}/assignments/leetcode:
    post:
      tags:
      - Topic
      summary: Add an existing LeetCode problem to a topic
      operationId: addLeetCodeProblemToTopic
      parameters:
      - name: topicId
        in: path
        description: Topic ID
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLeetCodeProblemToTopicRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAssignmentResponse"
  /testcases:
    post:
      tags:
      - Testcase
      summary: Create a testcase for a problem
      operationId: createTestcase
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestcaseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTestcaseResponse"
  /submissions:
    post:
      tags:
      - Submission
      summary: Submit code for a problem
      operationId: submit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCodeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseSubmissionResponse"
  /reviews/submission/{submissionId}:
    post:
      tags:
      - Review
      summary: Review a submission (AI code review)
      operationId: review
      parameters:
      - name: submissionId
        in: path
        description: Submission ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReviewResponse"
  /reviews/code:
    post:
      tags:
      - Review
      summary: Review code directly without submission
      operationId: reviewCode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCodeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseReviewResponse"
  /recommendations:
    post:
      tags:
      - Recommendation
      summary: Get recommended learning roadmap for a student on the current exercise
      operationId: getRecommendation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRecommendationResponse"
  /problems:
    post:
      tags:
      - Problem
      summary: Create a new problem
      operationId: createProblem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProblemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProblemResponse"
  /problems/manual:
    post:
      tags:
      - Problem
      summary: Create manual problem
      operationId: createManualProblem
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProblemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProblemResponse"
  /execution/run:
    post:
      tags:
      - Execution
      summary: Run code without judging
      operationId: run
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCodeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRunCodeResponse"
  /execution/judge:
    post:
      tags:
      - Execution
      summary: Run and judge code against testcases
      operationId: judge
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunTestcaseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseRunCodeResponse"
  /documents:
    post:
      tags:
      - Document
      summary: "Upload document (PDF, video, etc.)"
      operationId: create
      parameters:
      - name: topicId
        in: query
        description: Topic ID
        required: true
        schema:
          type: string
          format: uuid
      - name: title
        in: query
        required: true
        schema:
          type: string
      - name: description
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  description: File to upload
                  format: binary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseDocumentResponse"
  /classes:
    post:
      tags:
      - Class
      operationId: createClass
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - description
              - name
              - schedule
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                schedule:
                  type: string
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseClassResponse"
  /classes/{classId}/students/{userCode}:
    post:
      tags:
      - Class
      summary: Add student to class by user code
      operationId: addStudentByUserCode
      parameters:
      - name: classId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseObject"
    delete:
      tags:
      - Class
      summary: Remove student from class by user code
      operationId: removeStudentByUserCode
      parameters:
      - name: classId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseObject"
  /assignments:
    post:
      tags:
      - Assignment
      summary: Create new assignment
      operationId: createAssignment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAssignmentResponse"
  /assignments/topic/{topicId}/{assignmentId}/problems/leetcode:
    post:
      tags:
      - Assignment
      summary: Add an existing LeetCode problem to an assignment in a topic
      operationId: addLeetCodeProblemToAssignment
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProblemToAssignmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAssignmentResponse"
  /users/{id}:
    get:
      tags:
      - User
      summary: Get user by ID
      operationId: getUser
      parameters:
      - name: id
        in: path
        description: User ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserResponse"
  /users/role/{role}:
    get:
      tags:
      - User
      summary: Get all users by role
      operationId: getAllUsersByRole
      parameters:
      - name: role
        in: path
        description: User role
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListUserResponse"
  /users/code/{userCode}:
    get:
      tags:
      - User
      summary: Get user by user code
      operationId: getStudentByUserCode
      parameters:
      - name: userCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseUserResponse"
  /topics/{topicId}:
    get:
      tags:
      - Topic
      summary: Get topic detail (assignments + documents)
      operationId: getTopicDetail
      parameters:
      - name: topicId
        in: path
        description: Topic ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicDetailResponse"
  /topics/class/{classId}:
    get:
      tags:
      - Topic
      summary: Get topics overview by classId
      operationId: getTopicsByClass
      parameters:
      - name: classId
        in: path
        description: Class ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseTopicOverviewResponse"
  /testcases/problem/{problemId}:
    get:
      tags:
      - Testcase
      summary: Get testcases by problem ID
      operationId: getTestcases
      parameters:
      - name: problemId
        in: path
        description: Problem ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListTestcaseResponse"
  /testcases/assignment/{assignmentId}:
    get:
      tags:
      - Testcase
      summary: Get testcases by assignment ID
      operationId: getTestcasesByAssignment
      parameters:
      - name: assignmentId
        in: path
        description: Assignment ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListTestcaseResponse"
  /submissions/{submissionId}:
    get:
      tags:
      - Submission
      summary: Get submission detail
      operationId: detail
      parameters:
      - name: submissionId
        in: path
        description: Submission ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseSubmissionDetailResponse"
  /submissions/problem/{problemId}/{userId}:
    get:
      tags:
      - Submission
      summary: Get user submission for a problem
      operationId: getUserSubmissionsByProblemIdAndUserId
      parameters:
      - name: problemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListSubmission"
  /submissions/assignment/{assignmentId}:
    get:
      tags:
      - Submission
      summary: Get all submissions by assignmennt
      operationId: overview
      parameters:
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListSubmissionResponse"
  /submissions/assignment/{assignmentId}/{userId}:
    get:
      tags:
      - Submission
      summary: Get current user's submissions by assignmennt
      operationId: overview_1
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListSubmissionResponse"
  /submissions/assignment/{assignmentId}/me:
    get:
      tags:
      - Submission
      summary: Get my submissions by assignmennt
      operationId: overview_2
      parameters:
      - name: assignmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListSubmissionResponse"
  /reviews/problem/{problemId}:
    get:
      tags:
      - Review
      summary: Get all reviews for a problem
      operationId: getProblemReviews
      parameters:
      - name: problemId
        in: path
        description: Problem ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListReviewResponse"
  /reviews/problem/{problemId}/user/{userId}:
    get:
      tags:
      - Review
      summary: Get all reviews for a problem by user
      operationId: getProblemReviewsByUser
      parameters:
      - name: problemId
        in: path
        description: Problem ID
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        description: User ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListReviewResponse"
  /problems/{problemId}:
    get:
      tags:
      - Problem
      summary: Get problem detail
      operationId: getProblem
      parameters:
      - name: problemId
        in: path
        description: Problem ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProblemResponse"
  /problems/leetcode:
    get:
      tags:
      - Problem
      summary: Get paged LeetCode problems
      operationId: getAllLeetCodeProblems
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePageResponseProblemResponse"
  /problems/assignment/{assignmentId}:
    get:
      tags:
      - Problem
      summary: Get problem by assignment ID
      operationId: getProblemByAssignmentId
      parameters:
      - name: assignmentId
        in: path
        description: Assignment ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProblemResponse"
  /documents/topic/{topicId}:
    get:
      tags:
      - Document
      summary: Get documents by topic
      operationId: getByTopic
      parameters:
      - name: topicId
        in: path
        description: Topic ID
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListDocumentResponse"
  /documents/stream/{id}:
    get:
      tags:
      - Document
      summary: Stream video document (supports Range header)
      operationId: stream
      parameters:
      - name: id
        in: path
        description: Document ID
        required: true
        schema:
          type: string
      - name: Range
        in: header
        description: Range header for streaming
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: binary
  /documents/download/{id}:
    get:
      tags:
      - Document
      summary: Download document (inline preview)
      operationId: download
      parameters:
      - name: id
        in: path
        description: Document ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: binary
  /classes/{classId}:
    get:
      tags:
      - Class
      summary: Get class detail
      operationId: classDetail
      parameters:
      - name: classId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseClassDetailResponse"
  /classes/{classId}/students:
    get:
      tags:
      - Class
      summary: Get enrolled students
      operationId: getEnrolledStudents
      parameters:
      - name: classId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListUserResponse"
  /classes/me:
    get:
      tags:
      - Class
      summary: Get classes of current user
      operationId: myClasses
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListClassOverviewResponse"
  /assignments/topic/{topicId}:
    get:
      tags:
      - Assignment
      summary: Get assignments by topicId
      operationId: getAssignments
      parameters:
      - name: topicId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListAssignmentResponse"
components:
  schemas:
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        picture:
          type: string
    ApiResponseUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/UserResponse"
        timestamp:
          type: string
          format: date-time
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        userCode:
          type: string
        picture:
          type: string
        role:
          type: string
    UpdateProblemTemplateRequest:
      type: object
      properties:
        problemId:
          type: string
          format: uuid
        starterCodes:
          type: object
          additionalProperties:
            type: string
    ApiResponseProblemResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/ProblemResponse"
        timestamp:
          type: string
          format: date-time
    ProblemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
        problemConstraint:
          type: string
        type:
          type: string
          enum:
          - MANUAL
          - LEETCODE
        functionSkeletons:
          type: object
          additionalProperties:
            type: string
        testcases:
          type: array
          items:
            $ref: "#/components/schemas/TestcaseResponse"
        similarQuestionIds:
          type: array
          items:
            type: string
    TestcaseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        problemId:
          type: string
          format: uuid
        input:
          type: string
        expectedOutput:
          type: string
        explanation:
          type: string
        hidden:
          type: boolean
    LeetCodeImportRequest:
      type: object
      properties:
        externalId:
          type: string
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
        constraints:
          type: string
        starterCodes:
          type: object
          additionalProperties:
            type: string
        testcases:
          type: array
